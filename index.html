<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Navegantes - Diário de Bordo</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#b45a35" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Navegantes" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/nav-icon-192/192/192" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isLocalDevHost = ['localhost', '127.0.0.1'].includes(window.location.hostname);

          if (isLocalDevHost) {
            navigator.serviceWorker.getRegistrations()
              .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
              .then(() => console.log('Service Worker desregistrado no ambiente local para evitar interferencia no Vite.'))
              .catch((err) => console.log('Falha ao desregistrar Service Worker local', err));
            return;
          }

          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registrado!', reg))
            .catch(err => console.log('Falha ao registrar Service Worker', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
